server:
  port: 8080

spring:
  application:
    name: recall-spring-backend

recall:
  backend:
    mode: local
    legacy-base-url: http://127.0.0.1:8000
    request-timeout-ms: 12000
    health-timeout-ms: 5000
    fallback-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
